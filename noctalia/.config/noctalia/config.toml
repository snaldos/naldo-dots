[bar.default]
background_opacity = 0.70
center = [
  "control-center",
  "cat",
  "media",
  "audio_visualizer",
  "wallpaper",
  "wallhaven",
  "mpvpaper",
]
end = [
  "tray",
  "network",
  "bluetooth",
  "volume",
  "brightness",
  "battery",
  "sysmon",
  "session",
]
start = [
  "workspaces",
  "launcher",
  "clock",
  "notifications",
  "clipboard",
  "recorder",
  "screenshot",
]

[brightness]
enable_ddcutil = true

[calendar]
enabled = true

[calendar.account.personal_google]
name = "Personal Calendar"
type = "google"

[hooks]
wallpaper_changed = "~/.config/noctalia/hooks/theme-from-wallpaper.sh"

[idle]
behavior_order = ["lock", "screen-off", "lock-and-suspend"]

[idle.behavior.lock]
action = "lock"
enabled = true
timeout = 600

[idle.behavior.lock-and-suspend]
action = "lock_and_suspend"
enabled = true
timeout = 900

[idle.behavior.screen-off]
action = "screen_off"
enabled = true
timeout = 660

[keybinds]
up = ["up", "ctrl+k"]
down = ["down", "ctrl+j"]

[location]
auto_locate = true

[nightlight]
enabled = true

[plugins]
enabled = [
  "noctalia/screen_recorder",
  "noctalia/bongocat",
  "noctalia/kaomoji",
  "noctalia/translator",
  "noctalia/notes",
  "noctalia/wallhaven",
  "noctalia/timer",
  "noctalia/mpvpaper",
]

[plugin_settings."noctalia/notes"]
notes_dir = "~/Vaults/second-brain/00 - Inbox"

[plugin_settings."noctalia/wallhaven"]
# Keep api_key in machine-local credentials.toml; see credentials.toml.example.
download_dir = "~/Wallpapers/dark/default"

[shell]
screen_time_enabled = true
settings_show_advanced = true

[shell.greeter_sync]
auto_sync = false

[shell.panel]
clipboard_placement = "attached"
launcher_placement = "attached"

[shell.screenshot]
directory = "~/Pictures/Screenshots"
save_to_file = false

[system.monitor]
gpu_poll_seconds = 5

[theme]
builtin = "Tokyo-Night"
community_palette = "Tokyo Night Moon"
mode = "dark"
source = "builtin"
wallpaper_scheme = "m3-content"

[theme.templates]
builtin_ids = ["btop", "cava", "gtk3", "gtk4", "hyprland", "kitty"]
community_ids = []

[theme.templates.user.ghostty]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/ghostty-noctalia.conf"
output_path = "$XDG_CONFIG_HOME/ghostty/themes/noctalia"
post_hook = "pkill -USR2 -x ghostty || true"

[theme.templates.user.neovim]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/neovim-noctalia.lua"
output_path = "$XDG_CONFIG_HOME/nvim/lua/generated/matugen.lua"
post_hook = "pkill -USR1 nvim || true"

[theme.templates.user.pi]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/pi-noctalia.json"
output_path = "~/.pi/agent/themes/noctalia.json"

[theme.templates.user.starship]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/starship-noctalia.toml"
output_path = "$XDG_CONFIG_HOME/starship.toml"

[theme.templates.user.yazi_flavor]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/yazi-noctalia.toml"
output_path = "$XDG_CONFIG_HOME/yazi/flavors/noctalia.yazi/flavor.toml"

[theme.templates.user.yazi_selector]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/yazi-theme.toml"
output_path = "$XDG_CONFIG_HOME/yazi/theme.toml"

[theme.templates.user.yazi_syntax]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/yazi-noctalia.tmTheme"
output_path = "$XDG_CONFIG_HOME/yazi/flavors/noctalia.yazi/tmtheme.xml"

[theme.templates.user.zathura]
input_path = "$XDG_CONFIG_HOME/noctalia/templates/zathura-noctalia.conf"
output_path = "$XDG_CONFIG_HOME/zathura/zathurarc"
post_hook = "bash \"$HOME/.config/noctalia/hooks/reload-zathura-theme.sh\""

[wallpaper]
directory = "~/Wallpapers"
directory_dark = "~/Wallpapers/dark"
directory_light = "~/Wallpapers/light"

[widget.battery]
show_label = false

[widget.brightness]
show_label = false

[widget.cat]
input_devices = ["/dev/input/by-id/keyd-virtual-kbd"]
type = "noctalia/bongocat:cat"

[widget.cpu]
show_label = false

[widget.media]
album_art_only = true

[widget.network]
show_label = false

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.mpvpaper]
type = "noctalia/mpvpaper:mpvpaper"

[widget.wallhaven]
type = "noctalia/wallhaven:wallhaven"


[widget.sysmon]
show_label = false

[widget.volume]
show_label = false

[widget.audio_visualizer]
anchor = true
bands = 128
mirrored = false
show_when_idle = true
width = 400
